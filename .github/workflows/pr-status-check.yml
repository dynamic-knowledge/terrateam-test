name: PR Status Check

on:
  pull_request:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: number
      status:
        description: Status to send to the PR
        required: true
        type: choice
        options:
          - pending
          - success
          - failure

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  set-status:
    runs-on: ubuntu-latest
    steps:
      - name: Set PR commit status
        uses: actions/github-script@v7
        env:
          MANUAL_STATUS: ${{ github.event.inputs.status }}
        with:
          script: |
            const contextName = 'manual-pr-review';
            const descriptions = {
              pending: 'Awaiting manual review',
              success: 'Approved',
              failure: 'Rejected',
            };

            let prNumber;
            let sha;

            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
              sha = context.payload.pull_request.head.sha;
            } else {
              prNumber = Number(context.payload.inputs.pr_number);
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              sha = pr.head.sha;
            }

            const status =
              context.eventName === 'workflow_dispatch'
                ? process.env.MANUAL_STATUS
                : 'pending';

            if (!['pending', 'success', 'failure'].includes(status)) {
              core.setFailed(`Invalid status: ${status}`);
              return;
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: status,
              context: contextName,
              description: descriptions[status],
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/pr-status-check.yml`,
            });

            core.notice(
              `Set PR #${prNumber} (${sha.slice(0, 7)}) to "${status}" (context: ${contextName})`,
            );
