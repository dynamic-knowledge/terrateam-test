name: CODEOWNERS Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, review_requested, review_request_removed]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  statuses: write
  pull-requests: read

jobs:
  check-codeowners-reviews:
    runs-on: ubuntu-latest
    steps:
      - name: Check CODEOWNERS review status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const CHECK_NAME = 'codeowners-review';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;

            async function setStatus(state, description) {
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha,
                state,
                context: CHECK_NAME,
                description,
                target_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              });
            }

            // Set pending immediately so apply is blocked while we evaluate.
            await setStatus('pending', 'Checking CODEOWNERS review requirements…');

            // Use GitHub's GraphQL reviewDecision, which evaluates CODEOWNERS rules natively:
            //   - "any one of multiple owners on the same line is sufficient"
            //   - per-file requirements across multiple changed files are all enforced
            //   - no race condition: computed from branch protection rules, not review assignment state
            //
            // Prerequisite: branch protection must have "Require review from code owners" enabled.
            // If not enabled, reviewDecision is null and this workflow will fail loudly.
            const { repository } = await github.graphql(`
              query($owner: String!, $repo: String!, $pr: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewDecision
                    reviewRequests(first: 100) {
                      nodes {
                        requestedReviewer {
                          ... on User  { login }
                          ... on Team  { name }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner, repo, pr: prNumber });

            const decision = repository.pullRequest.reviewDecision;

            if (decision === 'APPROVED') {
              await setStatus('success', 'All CODEOWNERS reviews satisfied');
              return;
            }

            if (decision === 'CHANGES_REQUESTED') {
              await setStatus('pending', 'Changes requested — resolve before apply');
              return;
            }

            if (decision === 'REVIEW_REQUIRED') {
              const pending = repository.pullRequest.reviewRequests.nodes
                .map(n => n.requestedReviewer?.login ?? n.requestedReviewer?.name)
                .filter(Boolean)
                .join(', ');
              await setStatus('pending', pending
                ? `Waiting for reviews from: ${pending}`
                : 'Waiting for required code owner reviews');
              return;
            }

            // decision === null means "Require review from code owners" is not enabled in
            // branch protection. Fail loudly so the misconfiguration is visible.
            core.setFailed(
              'reviewDecision is null — enable "Require review from code owners" in branch protection'
            );
