dirs:
  fol/another-sample:
    lock_branch_target: all
    tags: []
    workspaces:
      app_dev3:
        tags:
        - dir:fol/another-sample
        - workspace:app_dev3
        when_modified:
          autoapply: false
          autoplan: true
          autoplan_draft_pr: true
          file_patterns:
          - fol/another-sample/*.tf
          - fol/another-sample/workspaces/app_dev3.tfvars.json
      semgrep:
        tags:
        - dir:fol/another-sample
        - workspace:semgrep
        when_modified:
          autoapply: false
          autoplan: true
          autoplan_draft_pr: true
          file_patterns:
          - fol/another-sample/*.tf
          - fol/another-sample/workspaces/semgrep.tfvars.json
  sample-component:
    lock_branch_target: all
    tags: []
    workspaces:
      app_dev3:
        tags:
        - dir:sample-component
        - workspace:app_dev3
        when_modified:
          autoapply: false
          autoplan: true
          autoplan_draft_pr: true
          file_patterns:
          - sample-component/*.tf
          - sample-component/workspaces/app_dev3.tfvars.json
      semgrep:
        tags:
        - dir:sample-component
        - workspace:semgrep
        when_modified:
          autoapply: false
          autoplan: true
          autoplan_draft_pr: true
          file_patterns:
          - sample-component/*.tf
          - sample-component/workspaces/semgrep.tfvars.json
# One workflow for all named workspaces: var file is workspaces/<workspace>.tfvars.json
# (TERRATEAM_WORKSPACE matches the workspace key in dirs.*.workspaces).
# Tag query must match implicit dir tags: dir:<repo-path> (see tag-system docs).
# "another-sample" does NOT match fol/another-sample — use dir:fol/another-sample.
#
# Backend files come from GitHub Actions secrets (.github/workflows/terrateam.yml env):
#   TF_BACKEND_CONFIG_HCL -> terrateam.tfbackend, TF_BACKEND_TFVARS_JSON -> backend.tfvars.json
workflows:
  - tag_query: "not dir:modules/*" #"dir:sample-component or dir:fol/another-sample"
    plan:
      - type: run
        cmd:
          - bash
          - -c
          - printenv TF_BACKEND_CONFIG_HCL > terrateam.tfbackend && printenv TF_BACKEND_TFVARS_JSON > backend.tfvars.json
      - type: init
        extra_args: ["-backend-config=terrateam.tfbackend"]
      - type: plan
        extra_args:
          - "-var-file=workspaces/$TERRATEAM_WORKSPACE.tfvars.json"
          - "-var-file=backend.tfvars.json"
          - "-no-color"
          - "-lock=false"
          - "-input=false"
    apply:
      - type: run
        cmd:
          - bash
          - -c
          - printenv TF_BACKEND_CONFIG_HCL > terrateam.tfbackend && printenv TF_BACKEND_TFVARS_JSON > backend.tfvars.json
      - type: init
        extra_args: ["-backend-config=terrateam.tfbackend"]
      - type: apply
        extra_args:
          - "-var-file=workspaces/$TERRATEAM_WORKSPACE.tfvars.json"
          - "-var-file=backend.tfvars.json"
          - "-no-color"
