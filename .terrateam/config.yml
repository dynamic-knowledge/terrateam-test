# .terrateam/config.yml
# https://terrateam.io/docs

# Autoplan on PRs when Terraform or workspace files change
when_modified:
  autoplan: true
  autoplan_draft_pr: true

  # Auto-apply Terraform changes after merge to main branch
  autoapply: false

apply_requirements:
  create_pending_apply_check: true
  checks:
    - tag_query: ""  # Apply to all directories and workspaces
      approved:
        enabled: true
        any_of_count: 1 
      merge_conflicts:
        enabled: true
      status_checks:
        enabled: true
        ignore_matching: []

# Enable automatic dependency detection
indexer:
  enabled: true

# OIDC runs globally before every operation (sets AWS credentials in env)
hooks:
  all:
    pre:
      - type: oidc
        provider: aws
        role_arn: "arn:aws:iam::619408137469:role/provisioning-backend"
        region: us-west-2
        session_name: terrateam-gha
        duration: 3600

dirs:
  sample-component:
    when_modified:
      file_patterns:
        - "${DIR}/*.tf"
        - "${DIR}/workspaces/*.tfvars.json"
    workspaces:
      semgrep: {}
      app_dev3: {}

  fol/another-sample:
    when_modified:
      file_patterns:
        - "${DIR}/*.tf"
        - "${DIR}/workspaces/*.tfvars.json"
    workspaces:
      semgrep: {}
      app_dev3: {}

# One workflow for all named workspaces: var file is workspaces/<workspace>.tfvars.json
# (TERRATEAM_WORKSPACE matches the workspace key in dirs.*.workspaces).
# Tag query must match implicit dir tags: dir:<repo-path> (see tag-system docs).
# "another-sample" does NOT match fol/another-sample — use dir:fol/another-sample.
#
# Backend files come from GitHub Actions secrets (.github/workflows/terrateam.yml env):
#   TF_BACKEND_CONFIG_HCL -> terrateam.tfbackend, TF_BACKEND_TFVARS_JSON -> backend.tfvars.json
workflows:
  - tag_query: "dir:sample-component or dir:fol/another-sample"
    plan:
      - type: run
        cmd:
          - bash
          - -c
          - printenv TF_BACKEND_CONFIG_HCL > terrateam.tfbackend && printenv TF_BACKEND_TFVARS_JSON > backend.tfvars.json
      - type: init
        extra_args: ["-backend-config=terrateam.tfbackend"]
      - type: plan
        extra_args:
          - "-var-file=workspaces/$TERRATEAM_WORKSPACE.tfvars.json"
          - "-var-file=backend.tfvars.json"
          - "-no-color"
          - "-lock=false"
          - "-input=false"
    apply:
      - type: run
        cmd:
          - bash
          - -c
          - printenv TF_BACKEND_CONFIG_HCL > terrateam.tfbackend && printenv TF_BACKEND_TFVARS_JSON > backend.tfvars.json
      - type: init
        extra_args: ["-backend-config=terrateam.tfbackend"]
      - type: apply
        extra_args:
          - "-var-file=workspaces/$TERRATEAM_WORKSPACE.tfvars.json"
          - "-var-file=backend.tfvars.json"
          - "-no-color"
