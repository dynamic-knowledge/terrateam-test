# .terrateam/config.yml
# https://terrateam.io/docs


# changes here gets reflected from the default branch only
apply_requirements:
  create_pending_apply_check: true
  checks:
    - tag_query: "not ( dir:modules/* or dir:datadog/modules/* or dir:analytics/modules/* or dir:provisioning-roles/* or dir:terraform-remote-state/* or dir:test/* or dir:.cookiecutter/*)"  # Apply to all directories and workspaces
      approved:
        enabled: true
      merge_conflicts:
        enabled: true
      status_checks:
        enabled: true
        ignore_matching: []

automerge:
  enabled: true
  require_explicit_apply: true
  retain_pr_title: true
  merge_strategy: squash
  delete_branch: true

config_builder:
  enabled: true
  script: scripts/config_builder

# Enable automatic dependency detection has limitation:
# / does not discover workspaces automatically/
# tries to run default workspace for each directory /
# but it discovers modules and nested modules

indexer:
  enabled: true

notifications:
  policies:
    - tag_query: ''
      comment_strategy: 'delete'

parallel_runs: 1
batch_runs:
  enabled: true
  max_workspaces_per_batch: 50
# OIDC runs globally before every operation (sets AWS credentials in env)
hooks:
  all:
    pre:
      - type: oidc
        provider: aws
        role_arn: "arn:aws:iam::619408137469:role/provisioning-backend"
        region: us-west-2
        session_name: terrateam-gha
        duration: 3600


# One workflow for all named workspaces: var file is workspaces/<workspace>.tfvars.json
# (TERRATEAM_WORKSPACE matches the workspace key in dirs.*.workspaces).
# Tag query must match implicit dir tags: dir:<repo-path> (see tag-system docs).
# "another-sample" does NOT match fol/another-sample — use dir:fol/another-sample.
#
# Backend files come from GitHub Actions secrets (.github/workflows/terrateam.yml env):
#   TF_BACKEND_CONFIG_HCL -> terrateam.tfbackend, TF_BACKEND_TFVARS_JSON -> backend.tfvars.json
#
# Secrets below are read from GitHub repo secrets (SECRETS_CONTEXT in terrateam.yml)
# and exported before init/plan/apply, mirroring the legacy GHA terraform job env block.
definitions:
  write_backend_files: &write_backend_files
    type: run
    cmd:
      - bash
      - -c
      - printenv TF_BACKEND_CONFIG_HCL > terrateam.tfbackend && printenv TF_BACKEND_TFVARS_JSON > backend.tfvars.json
  terraform_secrets: &terraform_secrets
    - type: env
      method: source
      sensitive: true
      cmd:
        - bash
        - -c
        - |
          echo "vars go here"
          # export AKUITY_API_KEY_ID="$AKUITY_API_KEY_ID"
          # export AKUITY_API_KEY_SECRET="$AKUITY_API_KEY_SECRET"
          # export SNOWFLAKE_USER="$SNOWFLAKE_USER"
          # export SNOWFLAKE_PASSWORD="$SNOWFLAKE_PASSWORD"
          # export TF_VAR_snowflake_user="$SNOWFLAKE_USER"
          # export TF_VAR_snowflake_password="$SNOWFLAKE_PASSWORD"
          # export TF_VAR_fivetran_api_key="$FIVETRAN_API_KEY"
          # export TF_VAR_fivetran_api_secret="$FIVETRAN_API_SECRET"
          # export TF_VAR_dreamdata_external_id="$DREAMDATA_EXTERNAL_ID"
          # export TF_VAR_dreamdata_snowflake_integration_external_id="$SNOWFLAKE_AWS_EXTERNAL_ID"
          # export TF_VAR_datadog_api_key="$DATADOG_API_KEY"
workflows:
  - tag_query: "not dir:modules/*" #"dir:sample-component or dir:fol/another-sample"
    plan:
      - *write_backend_files
      - *terraform_secrets
      - type: init
        extra_args: ["-backend-config=terrateam.tfbackend"]
      - type: plan
        extra_args:
          - "-var-file=workspaces/$TERRATEAM_WORKSPACE.tfvars.json"
          - "-var-file=backend.tfvars.json"
          - "-no-color"
          - "-lock=false"
          - "-input=false"
    apply:
      - *write_backend_files
      - *terraform_secrets
      - type: init
        extra_args: ["-backend-config=terrateam.tfbackend"]
      - type: apply
        extra_args:
          - "-var-file=workspaces/$TERRATEAM_WORKSPACE.tfvars.json"
          - "-var-file=backend.tfvars.json"
          - "-no-color"

